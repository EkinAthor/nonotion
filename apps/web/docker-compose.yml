# ==============================================================================
# Nonotion Web Standalone Docker Compose
# Run the Web service independently (requires external API)
# ==============================================================================
# Usage:
#   docker-compose up -d              # Start Web
#   docker-compose down               # Stop Web
#   docker-compose logs -f            # View logs
#
# Note: Set API_UPSTREAM to point to your API server
# ==============================================================================

services:
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
    container_name: nonotion-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    environment:
      - API_UPSTREAM=${API_UPSTREAM:-host.docker.internal:3001}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
