# ==============================================================================
# PostgreSQL for Local Development
# Start PostgreSQL database for local development with postgres storage backend
# ==============================================================================
# Usage:
#   docker compose -f docker-compose.postgres.yml up -d    # Start PostgreSQL
#   docker compose -f docker-compose.postgres.yml down     # Stop PostgreSQL
#   docker compose -f docker-compose.postgres.yml logs -f  # View logs
#
# Then run the API locally with:
#   STORAGE_TYPE=postgres DATABASE_URL=postgresql://nonotion:nonotion@localhost:5432/nonotion pnpm --filter @nonotion/api dev
#
# Windows PowerShell:
#   $env:STORAGE_TYPE="postgres"; $env:DATABASE_URL="postgresql://nonotion:nonotion@localhost:5432/nonotion"; pnpm --filter @nonotion/api dev
# ==============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: nonotion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nonotion
      POSTGRES_PASSWORD: nonotion
      POSTGRES_DB: nonotion
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nonotion-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U nonotion -d nonotion" ]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

volumes:
  postgres-data:
    driver: local

networks:
  nonotion-network:
    driver: bridge
